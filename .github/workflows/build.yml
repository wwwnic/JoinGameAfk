name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET 10 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Resolve app version
        shell: pwsh
        run: |
          $refName = "${{ github.ref_name }}"
          if ($refName -notmatch '^v?(?<version>\d+\.\d+\.\d+(?:-[0-9A-Za-z][0-9A-Za-z.-]*)?)$') {
            throw "Release ref '$refName' is not a supported app version tag. Expected vMAJOR.MINOR.PATCH or vMAJOR.MINOR.PATCH-suffix."
          }

          "APP_VERSION=$($Matches.version)" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          "Resolved app version: $($Matches.version)"

      - name: Restore dependencies
        run: dotnet restore JoinGameAfk/JoinGameAfk.csproj

      - name: Build solution
        run: dotnet build JoinGameAfk/JoinGameAfk.csproj --configuration Release --no-restore -p:Version=$env:APP_VERSION -p:InformationalVersion=$env:APP_VERSION

      - name: Publish single-file app
        run: dotnet publish JoinGameAfk/JoinGameAfk.csproj --configuration Release --runtime win-x64 --self-contained true -p:Version=$env:APP_VERSION -p:InformationalVersion=$env:APP_VERSION -p:PublishSingleFile=true -p:IncludeNativeLibrariesForSelfExtract=true -p:EnableCompressionInSingleFile=true -p:DebugType=None -p:DebugSymbols=false --output ${{ github.workspace }}\publish-single

      - name: Verify single-file artifact
        shell: pwsh
        run: |
          $publishDir = Join-Path $env:GITHUB_WORKSPACE 'publish-single'
          $exePath = Join-Path $publishDir 'JoinGameAfk.exe'

          if (-not (Test-Path $exePath)) {
            throw "Single-file executable was not produced at $exePath."
          }

          $unexpectedFiles = Get-ChildItem -Path $publishDir -Recurse -File |
            Where-Object { $_.FullName -ne $exePath }

          if ($unexpectedFiles) {
            $fileList = $unexpectedFiles.FullName -join [Environment]::NewLine
            throw "Single-file publish emitted loose files. These must be bundled into JoinGameAfk.exe:$([Environment]::NewLine)$fileList"
          }

      - name: Rename single-file executable
        run: Copy-Item -Path ${{ github.workspace }}\publish-single\JoinGameAfk.exe -Destination ${{ github.workspace }}\JoinGameAfk.exe

      - name: Publish split app
        run: dotnet publish JoinGameAfk/JoinGameAfk.csproj --configuration Release --runtime win-x64 --self-contained true -p:Version=$env:APP_VERSION -p:InformationalVersion=$env:APP_VERSION -p:PublishSingleFile=false -p:DebugType=None -p:DebugSymbols=false --output ${{ github.workspace }}\publish-split

      - name: Create split zip
        run: Compress-Archive -Path publish-split\* -DestinationPath JoinGameAfk-win-x64.zip

      - name: Generate release notes
        shell: pwsh
        run: |
          $currentTag = "${{ github.ref_name }}"
          $previousTag = git describe --tags --abbrev=0 "$currentTag^" 2>$null

          if ($LASTEXITCODE -ne 0 -or [string]::IsNullOrWhiteSpace($previousTag)) {
            $previousTag = $null
          }

          $commitRange = if ($previousTag) { "$previousTag..$currentTag" } else { $currentTag }
          $commits = git log $commitRange --pretty=format:'- %s (`%h`) by %an'

          "# $currentTag" | Out-File release-notes.md -Encoding utf8
          "" | Out-File release-notes.md -Append -Encoding utf8

          if ($previousTag) {
            "Changes since ``$previousTag``:" | Out-File release-notes.md -Append -Encoding utf8
          } else {
            "Changes included in this release:" | Out-File release-notes.md -Append -Encoding utf8
          }

          "" | Out-File release-notes.md -Append -Encoding utf8

          if ($commits) {
            $commits | Out-File release-notes.md -Append -Encoding utf8
          } else {
            "- No commits found for this release." | Out-File release-notes.md -Append -Encoding utf8
          }

      - name: Create GitHub Release and Upload Asset
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          body_path: release-notes.md
          files: |
            JoinGameAfk.exe
            JoinGameAfk-win-x64.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
