name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET 9 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Restore dependencies
        run: dotnet restore JoinGameAfk/JoinGameAfk.csproj

      - name: Build solution
        run: dotnet build JoinGameAfk/JoinGameAfk.csproj --configuration Release --no-restore

      - name: Publish app
        run: dotnet publish JoinGameAfk/JoinGameAfk.csproj --configuration Release --runtime win-x64 --self-contained true --output ${{ github.workspace }}\publish

      - name: Create zip
        run: Compress-Archive -Path publish\* -DestinationPath JoinGameAfk-win-x64.zip

      - name: Create GitHub Release and Upload Asset
        uses: softprops/action-gh-release@v2
        with:
          files: JoinGameAfk-win-x64.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}